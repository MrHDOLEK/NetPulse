name: Test&lint PHP codebase

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint-php:
    name: Test&lint PHP codebase
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Validate composer.json and composer.lock
        run: composer validate

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            vendor
            tools/mago/vendor
            tools/deptrac/vendor
          key: ${{ runner.os }}-composer-dependencies-${{ hashFiles('composer.lock', 'tools/mago/composer.lock', 'tools/deptrac/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-dependencies

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, intl, sockets, apcu

      - name: Setup just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-suggest

      - name: Install Mago & Deptrac (isolated tools)
        run: composer run-script tools:install

      - name: Lint (Mago)
        run: just lint

      - name: Static analysis (Mago)
        run: just analyze

      - name: Architecture (Deptrac)
        run: just deptrac

      - name: Execute tests
        run: |
          cp .env.test .env
          composer migrate
          composer test
