name: Test&lint PHP codebase

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint-php:
    name: Test&lint PHP codebase
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate composer.json and composer.lock
        run: composer validate

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            vendor
            tools/mago/vendor
            tools/deptrac/vendor
          key: ${{ runner.os }}-composer-dependencies-${{ hashFiles('composer.lock', 'tools/mago/composer.lock', 'tools/deptrac/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-dependencies

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, intl, sockets, apcu

      - name: Setup just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-suggest

      - name: Install Mago & Deptrac (isolated tools)
        run: composer run-script tools:install

      - name: Mago format check
        id: mago_format
        continue-on-error: true
        run: tools/mago/vendor/bin/mago format --check

      - name: Mago lint (SARIF)
        id: mago_lint
        continue-on-error: true
        shell: bash
        run: |
          set +e
          tools/mago/vendor/bin/mago lint --reporting-format=sarif > mago-lint.sarif
          code=$?
          # Mago prints nothing when there are no findings; write a valid empty SARIF so the upload still succeeds.
          [ -s mago-lint.sarif ] || echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Mago"}},"results":[]}]}' > mago-lint.sarif
          exit $code

      - name: Mago analyze (SARIF)
        id: mago_analyze
        continue-on-error: true
        shell: bash
        run: |
          set +e
          tools/mago/vendor/bin/mago analyze --reporting-format=sarif > mago-analyze.sarif
          code=$?
          [ -s mago-analyze.sarif ] || echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"Mago"}},"results":[]}]}' > mago-analyze.sarif
          exit $code

      - name: Upload Mago lint results (code scanning)
        if: ${{ always() }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: mago-lint.sarif
          category: mago-lint

      - name: Upload Mago analyze results (code scanning)
        if: ${{ always() }}
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: mago-analyze.sarif
          category: mago-analyze

      - name: Fail on Mago issues
        if: ${{ always() && (steps.mago_format.outcome == 'failure' || steps.mago_lint.outcome == 'failure' || steps.mago_analyze.outcome == 'failure') }}
        run: |
          echo "Mago reported format/lint/analyze issues - see the Security > Code scanning tab for line-level details."
          exit 1

      - name: Architecture (Deptrac)
        run: just deptrac

      - name: Execute tests
        run: |
          cp .env.test .env
          composer migrate
          composer test
