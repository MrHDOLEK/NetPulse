name: 🐞 Bug report
description: Report a problem so it can be reproduced and fixed.
title: "bug: <short summary>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please search existing issues first to avoid duplicates.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I ..., NetPulse ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps, commands, or requests. Include sample input where relevant.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of NetPulse is affected?
      options:
        - Dashboard / web UI
        - Probe agent (app:agent:run)
        - Scheduling / due work
        - Measurements / Ookla
        - Metrics / Prometheus / Grafana
        - Notifications
        - Auth / SSO / 2FA
        - Setup / Docker / install
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any relevant logs, stack traces, or console output. This is automatically formatted, no backticks needed.
      render: shell
  - type: input
    id: version
    attributes:
      label: NetPulse version / commit
      placeholder: e.g. main @ abc1234, or NETPULSE_VERSION
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: How are you running NetPulse?
      value: |
        - OS:
        - Docker / Docker Compose version:
        - Database (SQLite / PostgreSQL):
        - Browser (if a UI bug):
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I can reproduce this on the latest `main`.
          required: false
