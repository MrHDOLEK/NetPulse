name: 💡 Feature request
description: Suggest an idea or improvement for NetPulse.
title: "feat: <short summary>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please check existing issues and discussions first.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point. "I'm always frustrated when ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like NetPulse to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or prior art.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard / web UI
        - Probe agent / scheduling
        - Measurements / Ookla
        - Metrics / Prometheus / Grafana
        - Notifications
        - Auth / SSO / 2FA
        - Setup / Docker / deployment
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I'm willing to help implement this.
          required: false
