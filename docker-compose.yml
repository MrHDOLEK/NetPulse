services:
  app:
    container_name: netpulse-app
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
      target: dev
      args:
        INSTALL_XDEBUG: ${DOCKER_INSTALL_XDEBUG:-false}
        INSTALL_COMPOSER_DEV: ${DOCKER_INSTALL_COMPOSER_DEV:-false}
    working_dir: /var/www
    environment:
      DOCKER: "1"
      PHP_IDE_CONFIG: "serverName=app.local"
    volumes:
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini:ro
      - ./.docker/php/php-fpm.conf:/etc/php/fpm/php-fpm.conf:ro
      - ./.docker/php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini:ro
      - .:/var/www:delegated
      - app_sqlite:/var/www/var
    ports:
      - "${EXTERNAL_APP_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - netpulse

  agent:
    container_name: netpulse-agent
    profiles:
      - agent
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
      target: dev
      args:
        INSTALL_XDEBUG: ${DOCKER_INSTALL_XDEBUG:-false}
        INSTALL_COMPOSER_DEV: ${DOCKER_INSTALL_COMPOSER_DEV:-false}
    working_dir: /var/www
    entrypoint: []
    command: [ "php", "bin/console", "app:agent:run" ]
    environment:
      DOCKER: "1"
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-sync://}
      NETPULSE_API_URL: http://app:8080
      PROBE_ID: ${PROBE_ID}
      PROBE_TOKEN: ${PROBE_TOKEN}
      OOKLA_BINARY: speedtest
      AGENT_POLL_INTERVAL: ${AGENT_POLL_INTERVAL:-60}
    volumes:
      - ./.docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini:ro
      - .:/var/www:delegated
      - app_sqlite:/var/www/var
    networks:
      - netpulse
    restart: unless-stopped
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null -H \"Authorization: Bearer $${PROBE_TOKEN}\" http://app:8080/api/v1/probes/$${PROBE_ID}/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 150s
    labels:
      - autoheal=true

  autoheal:
    container_name: netpulse-autoheal
    image: willfarrell/autoheal:1.2.0
    profiles:
      - agent
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_START_PERIOD: 60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  prometheus:
    container_name: netpulse-prometheus
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
      - "--web.enable-lifecycle"
    volumes:
      - ./.docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${EXTERNAL_PROMETHEUS_PORT:-9090}:9090"
    networks:
      - netpulse
    restart: unless-stopped
    depends_on:
      - app

  grafana:
    container_name: netpulse-grafana
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./.docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./.docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${EXTERNAL_GRAFANA_PORT:-3000}:3000"
    networks:
      - netpulse
    restart: unless-stopped
    depends_on:
      - prometheus

  victoriametrics:
    container_name: netpulse-victoriametrics
    image: victoriametrics/victoria-metrics:v1.102.1
    profiles:
      - vm
    command:
      - "--storageDataPath=/victoria-metrics-data"
      - "--httpListenAddr=:8428"
    volumes:
      - victoriametrics_data:/victoria-metrics-data
    ports:
      - "${EXTERNAL_VICTORIAMETRICS_PORT:-8428}:8428"
    networks:
      - netpulse
    restart: unless-stopped

volumes:
  app_sqlite:
  prometheus_data:
  grafana_data:
  victoriametrics_data:

networks:
  netpulse:
    driver: bridge
    name: netpulse-network
