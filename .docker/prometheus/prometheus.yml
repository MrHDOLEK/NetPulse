global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: netpulse-dev

scrape_configs:
  - job_name: netpulse
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - "app:8080"
        labels:
          instance: netpulse-app

  - job_name: prometheus
    static_configs:
      - targets:
          - "localhost:9090"
